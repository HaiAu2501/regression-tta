adapt_dataloader:
  batch_size: 64
  shuffle: true
dataset:
  config:
    filter_gender: null
  name: utkface
  val_corruption:
    corruption_type: all
    severity: 5
  val_indices: configs/utkface-all_val_indices.npy
evaluator:
  compile_model: null
optimizer:
  config:
    lr: 0.001
    weight_decay: 0.0
  name: Adam
  param: fe_bn
regressor:
  config:
    backbone: resnet50
    in_channels: 3
    pretrained: false
  source: result/source/utkface/source_model_29700.pt
  type: image
tta:
  config:
    compile_model: null
    loss_config:
      eps: 1.0e-08
    pc_config:
      contrib_top_k: 100
      stat_file: result/source/utkface/feature_stats.pt
    train_mode: true
    weight_bias: 1.0
    weight_exp: 1.0
val_dataloader:
  batch_size: 256
