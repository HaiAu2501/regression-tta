adapt_dataloader:
  batch_size: 64
  shuffle: true
dataset:
  config:
    filter_gender: null
  name: utkface
  val_corruption:
    corruption_type: all
    severity: 5
  val_indices: configs/utkface-all_val_indices.npy
evaluator:
  compile_model: null
regressor:
  config:
    backbone: resnet50
    in_channels: 3
    pretrained: false
  source: result/source/utkface/source_model_29700.pt
  type: image
tta:
  config:
    compile_model: null
    fr_config:
      lr: 0.001
      n_epochs: 1
      steps_per_layer: 1
val_dataloader:
  batch_size: 256
