adapt_dataloader:
  batch_size: 64
  shuffle: true
dataset:
  name: mnist
evaluator:
  compile_model: null
optimizer:
  config:
    lr: 0.001
    weight_decay: 0.0
  name: Adam
  param: fe_bn
regressor:
  config:
    backbone: resnet26
    in_channels: 3
    pretrained: false
  source: result/source/svhn/source_model_114500.pt
  type: image
tta:
  config:
    compile_model: null
    disc_config:
      hidden_dim: 1024
      lr: 0.001
      weight_decay: 0.0
    lambda_final: 1.0
    lambda_init: 0.0
    max_iterations: 1000
    source_features_file: result/source/svhn/raw_features.pt
    train_mode: true
val_dataloader:
  batch_size: 256
